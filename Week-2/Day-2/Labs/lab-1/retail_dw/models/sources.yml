version: 2

sources:
  - name: raw_store
    description: Landing-zone tables ingested from operational DB.
    # By default dbt will look for a schema named RAW_STORE.
    # If your raw tables live elsewhere (e.g. PUBLIC), run:
    #   dbt run --project-dir ".\labs\lab-1\retail_dw" --vars "{raw_schema: PUBLIC}"
    database: "{{ target.database }}"
    schema: "{{ var('raw_schema', 'RAW_STORE') }}"
    tables:
      - name: customers
        columns:
          - name: customer_id
          - name: name
          - name: region
          - name: signup_date
      - name: orders
        columns:
          - name: order_id
          - name: customer_id
          - name: order_date
          - name: status
      - name: order_lines
        columns:
          - name: order_line_id
          - name: order_id
          - name: product_id
          - name: quantity
          - name: line_total
      - name: products
        columns:
          - name: product_id
          - name: sku
          - name: category
          - name: unit_price
